name: Build GDU V4.6 Slim Source WUHB

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Generate audio and compile GDU
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Locate or extract GDU project
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "$GITHUB_WORKSPACE/CMakeLists.txt" ]; then
            PROJECT_DIR="$GITHUB_WORKSPACE"
            echo "Project found at repository root."
          else
            ZIP_FILE=""

            if [ -f "$GITHUB_WORKSPACE/GDU-v4.6-slim-source.zip" ]; then
              ZIP_FILE="$GITHUB_WORKSPACE/GDU-v4.6-slim-source.zip"
            else
              ZIP_FILE="$(find "$GITHUB_WORKSPACE" \
                -maxdepth 1 \
                -type f \
                -name 'GDU*.zip' \
                -print \
                -quit)"
            fi

            if [ -z "$ZIP_FILE" ]; then
              echo "::error::No GDU ZIP archive or extracted project was found."
              exit 1
            fi

            EXTRACT_DIR="$GITHUB_WORKSPACE/project-src"
            rm -rf "$EXTRACT_DIR"
            mkdir -p "$EXTRACT_DIR"

            echo "Extracting: $ZIP_FILE"
            unzip -q "$ZIP_FILE" -d "$EXTRACT_DIR"

            CMAKE_FILE="$(find "$EXTRACT_DIR" \
              -type f \
              -name 'CMakeLists.txt' \
              -print \
              -quit)"

            if [ -z "$CMAKE_FILE" ]; then
              echo "::error::CMakeLists.txt was not found inside the archive."
              exit 1
            fi

            PROJECT_DIR="$(dirname "$CMAKE_FILE")"
          fi

          PROJECT_DIR="$(realpath "$PROJECT_DIR")"
          PROJECT_REL="$(realpath --relative-to="$GITHUB_WORKSPACE" "$PROJECT_DIR")"

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "PROJECT_REL=$PROJECT_REL" >> "$GITHUB_ENV"
          echo "Detected project directory: $PROJECT_DIR"

      - name: Verify slim source package
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_FILES=(
            "CMakeLists.txt"
            "source/main.cpp"
            "source/AudioPlayer.cpp"
            "source/Game.cpp"
            "source/LevelPack.cpp"
            "source/Renderer.cpp"
            "source/VisualEffects.cpp"
            "include/gdu/AudioPlayer.hpp"
            "include/gdu/Game.hpp"
            "include/gdu/LevelPack.hpp"
            "include/gdu/Renderer.hpp"
            "include/gdu/VisualEffects.hpp"
            "assets/levels/pack.json"
            "assets/music/manifest.json"
            "runtime_content/music/menu-theme.pcm"
            "runtime_content/sfx/ui-move.pcm"
            "runtime_content/sfx/ui-confirm.pcm"
            "runtime_content/sfx/ui-back.pcm"
            "tools/generate_runtime_pcm_from_ogg.sh"
            "tools/validate_levels.py"
            "tools/validate_audio_durations.py"
            "tools/validate_runtime_pcm.py"
          )

          for FILE in "${REQUIRED_FILES[@]}"; do
            if [ ! -s "$PROJECT_DIR/$FILE" ]; then
              echo "::error::Missing or empty file: $FILE"
              exit 1
            fi
            echo "Found: $FILE"
          done

          OGG_COUNT="$(find "$PROJECT_DIR/assets/music" \
            -maxdepth 1 \
            -type f \
            -name '[0-9][0-9]-*.ogg' | \
            wc -l | \
            tr -d ' ')"

          if [ "$OGG_COUNT" -ne 22 ]; then
            echo "::error::Expected 22 compressed OGG tracks, found $OGG_COUNT."
            exit 1
          fi

          if grep -qE \
            'target_link_libraries\s*\(\s*gdu\s+PRIVATE\s+padscore' \
            "$PROJECT_DIR/CMakeLists.txt"; then
            echo "::error::Invalid padscore linkage detected."
            exit 1
          fi

          grep -q 'wut_create_rpx(gdu)' "$PROJECT_DIR/CMakeLists.txt"
          grep -q 'wut_create_wuhb(gdu' "$PROJECT_DIR/CMakeLists.txt"
          grep -q 'activeBuffer' "$PROJECT_DIR/source/Renderer.cpp"
          grep -q 'playMenuTrack' "$PROJECT_DIR/source/AudioPlayer.cpp"
          grep -q 'drawFormTrail' "$PROJECT_DIR/source/main.cpp"
          grep -q 'eight-scene-director' "$PROJECT_DIR/assets/levels/pack.json"

      - name: Install FFmpeg
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

          ffmpeg -version | head -n 1

      - name: Generate Wii U PCM tracks from OGG
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"
          bash tools/generate_runtime_pcm_from_ogg.sh

          LEVEL_PCM_COUNT="$(find runtime_content/music \
            -maxdepth 1 \
            -type f \
            -name '[0-9][0-9]-*.pcm' | \
            wc -l | \
            tr -d ' ')"

          ALL_PCM_COUNT="$(find runtime_content/music \
            -maxdepth 1 \
            -type f \
            -name '*.pcm' | \
            wc -l | \
            tr -d ' ')"

          if [ "$LEVEL_PCM_COUNT" -ne 22 ] || [ "$ALL_PCM_COUNT" -ne 23 ]; then
            echo "::error::PCM generation produced an incomplete runtime set."
            exit 1
          fi

          du -sh runtime_content

      - name: Validate generated game data
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"
          python3 tools/validate_levels.py
          python3 tools/validate_audio_durations.py
          python3 tools/validate_runtime_pcm.py

      - name: Pull devkitPro image with retries
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="devkitpro/devkitppc:latest"

          for ATTEMPT in 1 2 3 4 5 6; do
            echo "Docker pull attempt $ATTEMPT of 6..."

            if docker pull "$IMAGE"; then
              echo "devkitPro image downloaded successfully."
              exit 0
            fi

            echo "::warning::Docker pull failed on attempt $ATTEMPT."
            docker system prune -af || true
            sleep $((ATTEMPT * 15))
          done

          echo "::error::Unable to download the devkitPro image after 6 attempts."
          exit 1

      - name: Build GDU inside devkitPro
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "$GITHUB_WORKSPACE/build"
          rm -rf "$GITHUB_WORKSPACE/dist"
          mkdir -p "$GITHUB_WORKSPACE/dist"

          docker run --rm \
            -e DEVKITPRO=/opt/devkitpro \
            -e DEVKITPPC=/opt/devkitpro/devkitPPC \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w "/workspace/$PROJECT_REL" \
            devkitpro/devkitppc:latest \
            bash -lc '
              set -euo pipefail

              export PATH="/opt/devkitpro/devkitPPC/bin:/opt/devkitpro/tools/bin:/opt/devkitpro/portlibs/wiiu/bin:$PATH"

              python3 tools/validate_levels.py
              python3 tools/validate_runtime_pcm.py

              /opt/devkitpro/portlibs/wiiu/bin/powerpc-eabi-cmake \
                -S . \
                -B /workspace/build \
                -DCMAKE_BUILD_TYPE=Release

              cmake --build /workspace/build \
                --target gdu_wuhb \
                --parallel 2

              WUHB_FILE="$(find /workspace/build \
                -type f \
                -name "gdu.wuhb" \
                -print \
                -quit)"

              if [ -z "$WUHB_FILE" ]; then
                WUHB_FILE="$(find /workspace/build \
                  -type f \
                  -name "*.wuhb" \
                  -print \
                  -quit)"
              fi

              if [ -z "$WUHB_FILE" ] || [ ! -s "$WUHB_FILE" ]; then
                echo "No valid WUHB file was generated."
                find /workspace/build -maxdepth 3 -type f -print
                exit 1
              fi

              cp "$WUHB_FILE" /workspace/dist/gdu.wuhb
              test -s /workspace/dist/gdu.wuhb
              ls -lh /workspace/dist/gdu.wuhb
            '

      - name: Verify final WUHB
        shell: bash
        run: |
          set -euo pipefail

          test -s "$GITHUB_WORKSPACE/dist/gdu.wuhb"

          FILE_COUNT="$(find "$GITHUB_WORKSPACE/dist" \
            -maxdepth 1 \
            -type f | \
            wc -l | \
            tr -d ' ')"

          if [ "$FILE_COUNT" -ne 1 ]; then
            echo "::error::The artifact must contain only gdu.wuhb."
            find "$GITHUB_WORKSPACE/dist" -type f -print
            exit 1
          fi

          ls -lh "$GITHUB_WORKSPACE/dist/gdu.wuhb"

      - name: Upload GDU WUHB
        uses: actions/upload-artifact@v4
        with:
          name: GDU-V4.6-Slim-Source-WUHB
          path: dist/gdu.wuhb
          if-no-files-found: error
          retention-days: 30
