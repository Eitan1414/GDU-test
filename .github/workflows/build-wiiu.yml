name: Build GDU WUHB

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build GDU WUHB only
    runs-on: ubuntu-latest

    container:
      image: devkitpro/devkitppc:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure devkitPro
        shell: bash
        run: |
          set -euo pipefail

          echo "DEVKITPRO=/opt/devkitpro" >> "$GITHUB_ENV"
          echo "DEVKITPPC=/opt/devkitpro/devkitPPC" >> "$GITHUB_ENV"

          echo "/opt/devkitpro/devkitPPC/bin" >> "$GITHUB_PATH"
          echo "/opt/devkitpro/tools/bin" >> "$GITHUB_PATH"
          echo "/opt/devkitpro/portlibs/wiiu/bin" >> "$GITHUB_PATH"

      - name: Locate or extract GDU project
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "$GITHUB_WORKSPACE/CMakeLists.txt" ]; then
            PROJECT_DIR="$GITHUB_WORKSPACE"
            echo "Project found at repository root."
          else
            ZIP_FILE=""

            if [ -f "$GITHUB_WORKSPACE/GDU-visual-lab-2d-3d-custom.zip" ]; then
              ZIP_FILE="$GITHUB_WORKSPACE/GDU-visual-lab-2d-3d-custom.zip"
            else
              ZIP_FILE="$(find "$GITHUB_WORKSPACE" \
                -maxdepth 1 \
                -type f \
                -name "GDU*.zip" \
                -print \
                -quit)"
            fi

            if [ -z "$ZIP_FILE" ]; then
              echo "::error::No GDU ZIP archive was found."
              exit 1
            fi

            EXTRACT_DIR="$GITHUB_WORKSPACE/extracted-project"

            rm -rf "$EXTRACT_DIR"
            mkdir -p "$EXTRACT_DIR"

            echo "Extracting: $ZIP_FILE"
            unzip -q "$ZIP_FILE" -d "$EXTRACT_DIR"

            CMAKE_FILE="$(find "$EXTRACT_DIR" \
              -type f \
              -name "CMakeLists.txt" \
              -print \
              -quit)"

            if [ -z "$CMAKE_FILE" ]; then
              echo "::error::CMakeLists.txt was not found in the ZIP."
              exit 1
            fi

            PROJECT_DIR="$(dirname "$CMAKE_FILE")"
          fi

          PROJECT_DIR="$(realpath "$PROJECT_DIR")"

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Project directory: $PROJECT_DIR"

      - name: Verify project files
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_FILES=(
            "CMakeLists.txt"
            "source/main.cpp"
            "source/Game.cpp"
            "source/LevelPack.cpp"
            "source/Renderer.cpp"
            "source/VisualEffects.cpp"
            "include/gdu/Game.hpp"
            "include/gdu/LevelPack.hpp"
            "include/gdu/Renderer.hpp"
            "include/gdu/VisualEffects.hpp"
            "assets/levels/pack.json"
            "assets/music/manifest.json"
          )

          for FILE in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$PROJECT_DIR/$FILE" ]; then
              echo "::error::Missing file: $FILE"
              exit 1
            fi

            echo "Found: $FILE"
          done

      - name: Validate levels and music
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"

          if [ -f "tools/validate_levels.py" ]; then
            python3 tools/validate_levels.py
          fi

          if [ -f "tools/validate_audio_durations.py" ]; then
            python3 tools/validate_audio_durations.py
          fi

          MUSIC_COUNT="$(find assets/music \
            -maxdepth 1 \
            -type f \
            -name "*.ogg" |
            wc -l |
            tr -d " ")"

          echo "Music files found: $MUSIC_COUNT"

          if [ "$MUSIC_COUNT" -ne 22 ]; then
            echo "::error::Expected 22 OGG files, found $MUSIC_COUNT."
            exit 1
          fi

      - name: Correct CMake WUHB configuration
        shell: bash
        run: |
          set -euo pipefail

          CMAKE_FILE="$PROJECT_DIR/CMakeLists.txt"

          # Remove the incorrect library added by the previous workflow.
          sed -i \
            '/target_link_libraries *(gdu PRIVATE padscore *)/d' \
            "$CMAKE_FILE"

          # Add native WUHB generation if it is not already present.
          if ! grep -q "wut_create_wuhb" "$CMAKE_FILE"; then
            cat >> "$CMAKE_FILE" <<'CMAKE_EOF'

          # Generate the Aroma WUHB package.
          wut_create_wuhb(gdu
              CONTENT "${CMAKE_CURRENT_SOURCE_DIR}/assets"
              NAME "GDU - Pulse Rift"
              SHORTNAME "GDU"
              AUTHOR "Eitan1414"
          )
          CMAKE_EOF
          fi

          echo "Final CMakeLists.txt:"
          cat "$CMAKE_FILE"

          if grep -q "padscore" "$CMAKE_FILE"; then
            echo "::error::The invalid padscore linkage is still present."
            exit 1
          fi

          grep -q "wut_create_wuhb" "$CMAKE_FILE"

      - name: Check Wii U tools
        shell: bash
        run: |
          set -euo pipefail

          test -x /opt/devkitpro/devkitPPC/bin/powerpc-eabi-g++
          test -x /opt/devkitpro/tools/bin/elf2rpl
          test -x /opt/devkitpro/tools/bin/wuhbtool
          test -x /opt/devkitpro/portlibs/wiiu/bin/powerpc-eabi-cmake

          powerpc-eabi-g++ --version
          cmake --version

      - name: Configure Wii U build
        shell: bash
        run: |
          set -euo pipefail

          BUILD_DIR="$GITHUB_WORKSPACE/build"

          rm -rf "$BUILD_DIR"

          /opt/devkitpro/portlibs/wiiu/bin/powerpc-eabi-cmake \
            -S "$PROJECT_DIR" \
            -B "$BUILD_DIR" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build GDU WUHB
        shell: bash
        run: |
          set -euo pipefail

          BUILD_DIR="$GITHUB_WORKSPACE/build"

          # Builds the temporary RPX and immediately packages it as WUHB.
          cmake --build "$BUILD_DIR" \
            --target gdu_wuhb \
            --parallel 2

          echo "Generated files:"
          find "$BUILD_DIR" -maxdepth 3 -type f -print

          WUHB_FILE="$(find "$BUILD_DIR" \
            -type f \
            -name "gdu.wuhb" \
            -print \
            -quit)"

          if [ -z "$WUHB_FILE" ]; then
            WUHB_FILE="$(find "$BUILD_DIR" \
              -type f \
              -name "*.wuhb" \
              -print \
              -quit)"
          fi

          if [ -z "$WUHB_FILE" ] || [ ! -s "$WUHB_FILE" ]; then
            echo "::error::No valid WUHB file was generated."
            exit 1
          fi

          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp "$WUHB_FILE" "$GITHUB_WORKSPACE/dist/gdu.wuhb"

          test -s "$GITHUB_WORKSPACE/dist/gdu.wuhb"

          echo "Final WUHB:"
          ls -lh "$GITHUB_WORKSPACE/dist/gdu.wuhb"

      - name: Verify WUHB-only output
        shell: bash
        run: |
          set -euo pipefail

          test -s "$GITHUB_WORKSPACE/dist/gdu.wuhb"

          if find "$GITHUB_WORKSPACE/dist" -type f -name "*.rpx" | grep -q .; then
            echo "::error::An RPX was accidentally included in the final output."
            exit 1
          fi

          echo "The final artifact contains only gdu.wuhb."

      - name: Upload GDU WUHB
        uses: actions/upload-artifact@v4
        with:
          name: GDU-WUHB
          path: dist/gdu.wuhb
          if-no-files-found: error
          retention-days: 30
