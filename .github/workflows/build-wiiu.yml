name: Build GDU Wii U

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Compile GDU
    runs-on: ubuntu-latest

    container:
      image: devkitpro/devkitppc:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Locate and extract project
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "${GITHUB_WORKSPACE}/CMakeLists.txt" ]; then
            PROJECT_DIR="${GITHUB_WORKSPACE}"
          else
            ZIP_FILE="$(find "${GITHUB_WORKSPACE}" -maxdepth 1 -type f -name "*.zip" -print -quit)"

            if [ -z "${ZIP_FILE}" ]; then
              echo "ERROR: No ZIP file was found."
              exit 1
            fi

            echo "Extracting ${ZIP_FILE}"

            EXTRACT_DIR="${GITHUB_WORKSPACE}/extracted-project"
            rm -rf "${EXTRACT_DIR}"
            mkdir -p "${EXTRACT_DIR}"

            unzip -q "${ZIP_FILE}" -d "${EXTRACT_DIR}"

            CMAKE_FILE="$(find "${EXTRACT_DIR}" -type f -name "CMakeLists.txt" -print -quit)"

            if [ -z "${CMAKE_FILE}" ]; then
              echo "ERROR: CMakeLists.txt was not found inside the ZIP."
              exit 1
            fi

            PROJECT_DIR="$(dirname "${CMAKE_FILE}")"
          fi

          PROJECT_DIR="$(realpath "${PROJECT_DIR}")"

          echo "Project directory: ${PROJECT_DIR}"
          echo "PROJECT_DIR=${PROJECT_DIR}" >> "${GITHUB_ENV}"

      - name: Verify project files
        shell: bash
        run: |
          set -euo pipefail

          test -f "${PROJECT_DIR}/CMakeLists.txt"
          test -f "${PROJECT_DIR}/source/main.cpp"
          test -f "${PROJECT_DIR}/source/Game.cpp"
          test -f "${PROJECT_DIR}/source/LevelPack.cpp"
          test -f "${PROJECT_DIR}/include/gdu/Game.hpp"
          test -f "${PROJECT_DIR}/include/gdu/LevelPack.hpp"
          test -f "${PROJECT_DIR}/assets/levels/pack.json"
          test -f "${PROJECT_DIR}/tools/validate_levels.py"

          echo "Project files found."

      - name: Validate levels
        shell: bash
        run: |
          set -euo pipefail
          cd "${PROJECT_DIR}"
          python tools/validate_levels.py

      - name: Validate music
        shell: bash
        run: |
          set -euo pipefail

          MUSIC_COUNT="$(find "${PROJECT_DIR}/assets/music" -maxdepth 1 -type f -name "*.ogg" | wc -l | tr -d " ")"

          echo "Music files found: ${MUSIC_COUNT}"

          if [ "${MUSIC_COUNT}" -ne 21 ]; then
            echo "ERROR: Expected 21 OGG files."
            exit 1
          fi

      - name: Check Wii U tools
        shell: bash
        run: |
          set -euo pipefail

          command -v powerpc-eabi-g++
          command -v wuhbtool
          command -v elf2rpl

          test -x /opt/devkitpro/portlibs/wiiu/bin/powerpc-eabi-cmake

      - name: Configure Wii U build
        shell: bash
        run: |
          set -euo pipefail

          BUILD_DIR="${GITHUB_WORKSPACE}/build"

          rm -rf "${BUILD_DIR}"

          /opt/devkitpro/portlibs/wiiu/bin/powerpc-eabi-cmake \
            -S "${PROJECT_DIR}" \
            -B "${BUILD_DIR}" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Compile RPX
        shell: bash
        run: |
          set -euo pipefail

          cmake --build "${GITHUB_WORKSPACE}/build" --parallel 2

          test -s "${GITHUB_WORKSPACE}/build/gdu.rpx"

          ls -lh "${GITHUB_WORKSPACE}/build/gdu.rpx"

      - name: Create WUHB
        shell: bash
        run: |
          set -euo pipefail

          wuhbtool \
            "${GITHUB_WORKSPACE}/build/gdu.rpx" \
            "${GITHUB_WORKSPACE}/build/gdu.wuhb" \
            --name="GDU - Pulse Rift" \
            --short-name="GDU" \
            --author="Eitan1414" \
            --content="${PROJECT_DIR}/assets"

          test -s "${GITHUB_WORKSPACE}/build/gdu.wuhb"

          ls -lh "${GITHUB_WORKSPACE}/build/gdu.wuhb"

      - name: Create SD package
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="${GITHUB_WORKSPACE}/dist/wiiu/apps/gdu"

          rm -rf "${GITHUB_WORKSPACE}/dist"
          mkdir -p "${APP_DIR}"

          cp "${GITHUB_WORKSPACE}/build/gdu.wuhb" "${APP_DIR}/gdu.wuhb"
          cp "${GITHUB_WORKSPACE}/build/gdu.rpx" "${APP_DIR}/gdu.rpx"

          if [ -f "${PROJECT_DIR}/README.md" ]; then
            cp "${PROJECT_DIR}/README.md" "${APP_DIR}/README.txt"
          fi

          find "${GITHUB_WORKSPACE}/dist" -type f -print

      - name: Upload Wii U build
        uses: actions/upload-artifact@v4
        with:
          name: GDU-WiiU-Aroma
          path: dist
          if-no-files-found: error
          retention-days: 30
