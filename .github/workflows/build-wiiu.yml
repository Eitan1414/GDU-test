name: Build GDU V4.3 Overhead 3D WUHB

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build WUHB only
    runs-on: ubuntu-latest

    container:
      image: devkitpro/devkitppc:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure devkitPro
        shell: bash
        run: |
          set -euo pipefail

          echo "DEVKITPRO=/opt/devkitpro" >> "$GITHUB_ENV"
          echo "DEVKITPPC=/opt/devkitpro/devkitPPC" >> "$GITHUB_ENV"

          echo "/opt/devkitpro/devkitPPC/bin" >> "$GITHUB_PATH"
          echo "/opt/devkitpro/tools/bin" >> "$GITHUB_PATH"
          echo "/opt/devkitpro/portlibs/wiiu/bin" >> "$GITHUB_PATH"

      - name: Locate or extract project
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "$GITHUB_WORKSPACE/CMakeLists.txt" ]; then
            project_dir="$GITHUB_WORKSPACE"
          else
            zip_file="$(find "$GITHUB_WORKSPACE" \
              -maxdepth 1 \
              -type f \
              -name 'GDU*.zip' \
              -print \
              -quit)"

            if [ -z "$zip_file" ]; then
              echo "::error::No extracted GDU project or GDU ZIP archive was found."
              exit 1
            fi

            extract_dir="$GITHUB_WORKSPACE/extracted-project"

            rm -rf "$extract_dir"
            mkdir -p "$extract_dir"

            unzip -q "$zip_file" -d "$extract_dir"

            cmake_file="$(find "$extract_dir" \
              -type f \
              -name CMakeLists.txt \
              -print \
              -quit)"

            if [ -z "$cmake_file" ]; then
              echo "::error::CMakeLists.txt was not found in the archive."
              exit 1
            fi

            project_dir="$(dirname "$cmake_file")"
          fi

          project_dir="$(realpath "$project_dir")"

          echo "PROJECT_DIR=$project_dir" >> "$GITHUB_ENV"
          echo "Project: $project_dir"

      - name: Validate campaign and audio
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"

          python3 tools/validate_levels.py
          python3 tools/validate_audio_durations.py

          test "$(find assets/music \
            -maxdepth 1 \
            -type f \
            -name '*.ogg' |
            wc -l |
            tr -d ' ')" -eq 22

      - name: Verify source tree
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"

          for file in \
            CMakeLists.txt \
            source/main.cpp \
            source/Game.cpp \
            source/LevelPack.cpp \
            source/Renderer.cpp \
            source/VisualEffects.cpp \
            include/gdu/Game.hpp \
            include/gdu/Renderer.hpp \
            include/gdu/VisualEffects.hpp \
            assets/levels/pack.json; do

            test -s "$file" || {
              echo "::error::Missing $file"
              exit 1
            }
          done

          if grep -q 'target_link_libraries *(gdu PRIVATE padscore' CMakeLists.txt; then
            echo "::error::Invalid -lpadscore linkage detected."
            exit 1
          fi

          grep -q 'wut_create_wuhb' CMakeLists.txt
          grep -q 'ffast-math' CMakeLists.txt
          grep -q 'fomit-frame-pointer' CMakeLists.txt
          grep -q 'drawOverheadTrackRun' source/main.cpp
          grep -q 'kSecretPhraseMasks' source/Game.cpp
          grep -q 'bool gapAt' include/gdu/Game.hpp

      - name: Configure Wii U build
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "$GITHUB_WORKSPACE/build"

          /opt/devkitpro/portlibs/wiiu/bin/powerpc-eabi-cmake \
            -S "$PROJECT_DIR" \
            -B "$GITHUB_WORKSPACE/build" \
            -DCMAKE_BUILD_TYPE=Release

            - name: Build WUHB
        shell: bash
        run: |
          set -euo pipefail

          BUILD_DIR="$GITHUB_WORKSPACE/build"
          DIST_DIR="$GITHUB_WORKSPACE/dist"

          cmake --build "$BUILD_DIR" \
            --target gdu_wuhb \
            --parallel 2

          WUHB_FILE="$(find "$BUILD_DIR" \
            -type f \
            -name 'gdu.wuhb' \
            -print \
            -quit)"

          if [ -z "$WUHB_FILE" ]; then
            WUHB_FILE="$(find "$BUILD_DIR" \
              -type f \
              -name '*.wuhb' \
              -print \
              -quit)"
          fi

          if [ -z "$WUHB_FILE" ] || [ ! -s "$WUHB_FILE" ]; then
            echo "::error::gdu.wuhb was not generated."
            find "$BUILD_DIR" -maxdepth 3 -type f -print
            exit 1
          fi

          rm -rf "$DIST_DIR"
          mkdir -p "$DIST_DIR"

          cp "$WUHB_FILE" "$DIST_DIR/gdu.wuhb"

          test -s "$DIST_DIR/gdu.wuhb"

          echo "WUHB generated successfully:"
          ls -lh "$DIST_DIR/gdu.wuhb"

      - name: Upload WUHB only
        uses: actions/upload-artifact@v4
        with:
          name: GDU-V4.3-WUHB
          path: dist/gdu.wuhb
          if-no-files-found: error
          retention-days: 30
