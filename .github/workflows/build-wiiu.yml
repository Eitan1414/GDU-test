name: Build GDU V4.3 WUHB

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Compile GDU for Wii U
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            ca-certificates \
            curl \
            gnupg \
            unzip \
            xz-utils

      - name: Install devkitPro
        shell: bash
        run: |
          set -euo pipefail

          curl \
            --fail \
            --location \
            --retry 5 \
            --retry-delay 5 \
            --output install-devkitpro-pacman \
            https://apt.devkitpro.org/install-devkitpro-pacman

          chmod +x install-devkitpro-pacman
          sudo ./install-devkitpro-pacman

          sudo dkp-pacman \
            -Syu \
            --noconfirm

          sudo dkp-pacman \
            -S \
            --needed \
            --noconfirm \
            wiiu-dev

      - name: Configure devkitPro environment
        shell: bash
        run: |
          set -euo pipefail

          echo "DEVKITPRO=/opt/devkitpro" >> "$GITHUB_ENV"
          echo "DEVKITPPC=/opt/devkitpro/devkitPPC" >> "$GITHUB_ENV"

          echo "/opt/devkitpro/devkitPPC/bin" >> "$GITHUB_PATH"
          echo "/opt/devkitpro/tools/bin" >> "$GITHUB_PATH"
          echo "/opt/devkitpro/portlibs/wiiu/bin" >> "$GITHUB_PATH"

      - name: Locate or extract GDU project
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "$GITHUB_WORKSPACE/CMakeLists.txt" ]; then
            PROJECT_DIR="$GITHUB_WORKSPACE"
            echo "Project found directly at repository root."
          else
            ZIP_FILE="$(find "$GITHUB_WORKSPACE" \
              -maxdepth 1 \
              -type f \
              -name 'GDU*.zip' \
              -print \
              -quit)"

            if [ -z "$ZIP_FILE" ]; then
              echo "::error::No extracted GDU project or GDU ZIP archive was found."
              exit 1
            fi

            EXTRACT_DIR="$GITHUB_WORKSPACE/extracted-project"

            rm -rf "$EXTRACT_DIR"
            mkdir -p "$EXTRACT_DIR"

            echo "Extracting: $ZIP_FILE"
            unzip -q "$ZIP_FILE" -d "$EXTRACT_DIR"

            CMAKE_FILE="$(find "$EXTRACT_DIR" \
              -type f \
              -name 'CMakeLists.txt' \
              -print \
              -quit)"

            if [ -z "$CMAKE_FILE" ]; then
              echo "::error::CMakeLists.txt was not found inside the archive."
              exit 1
            fi

            PROJECT_DIR="$(dirname "$CMAKE_FILE")"
          fi

          PROJECT_DIR="$(realpath "$PROJECT_DIR")"

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Detected project directory: $PROJECT_DIR"

          echo "Project files:"
          find "$PROJECT_DIR" -maxdepth 2 -type f -print

      - name: Verify required files
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_FILES=(
            "CMakeLists.txt"
            "source/main.cpp"
            "source/Game.cpp"
            "source/LevelPack.cpp"
            "source/Renderer.cpp"
            "source/VisualEffects.cpp"
            "include/gdu/Game.hpp"
            "include/gdu/LevelPack.hpp"
            "include/gdu/Renderer.hpp"
            "include/gdu/VisualEffects.hpp"
            "assets/levels/pack.json"
            "assets/music/manifest.json"
            "tools/validate_levels.py"
            "tools/validate_audio_durations.py"
          )

          for FILE in "${REQUIRED_FILES[@]}"; do
            if [ ! -s "$PROJECT_DIR/$FILE" ]; then
              echo "::error::Missing or empty file: $FILE"
              exit 1
            fi

            echo "Found: $FILE"
          done

      - name: Validate levels
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"
          python3 tools/validate_levels.py

      - name: Validate music
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"
          python3 tools/validate_audio_durations.py

          MUSIC_COUNT="$(find assets/music \
            -maxdepth 1 \
            -type f \
            -name '*.ogg' |
            wc -l |
            tr -d ' ')"

          echo "OGG files found: $MUSIC_COUNT"

          if [ "$MUSIC_COUNT" -ne 22 ]; then
            echo "::error::Expected 22 OGG files, found $MUSIC_COUNT."
            exit 1
          fi

      - name: Verify CMake configuration
        shell: bash
        run: |
          set -euo pipefail

          CMAKE_FILE="$PROJECT_DIR/CMakeLists.txt"

          if grep -qE \
            'target_link_libraries\s*\(\s*gdu\s+PRIVATE\s+padscore' \
            "$CMAKE_FILE"; then

            echo "::error::Invalid padscore linkage detected."
            exit 1
          fi

          if ! grep -q 'wut_create_rpx(gdu)' "$CMAKE_FILE"; then
            echo "::error::wut_create_rpx(gdu) is missing from CMakeLists.txt."
            exit 1
          fi

          if ! grep -q 'wut_create_wuhb(gdu' "$CMAKE_FILE"; then
            echo "::error::wut_create_wuhb(gdu) is missing from CMakeLists.txt."
            exit 1
          fi

          echo "CMake configuration is valid."

      - name: Check Wii U tools
        shell: bash
        run: |
          set -euo pipefail

          test -x /opt/devkitpro/devkitPPC/bin/powerpc-eabi-g++
          test -x /opt/devkitpro/tools/bin/elf2rpl
          test -x /opt/devkitpro/tools/bin/wuhbtool
          test -x /opt/devkitpro/portlibs/wiiu/bin/powerpc-eabi-cmake

          /opt/devkitpro/devkitPPC/bin/powerpc-eabi-g++ --version
          cmake --version

      - name: Configure Wii U build
        shell: bash
        run: |
          set -euo pipefail

          BUILD_DIR="$GITHUB_WORKSPACE/build"

          rm -rf "$BUILD_DIR"

          /opt/devkitpro/portlibs/wiiu/bin/powerpc-eabi-cmake \
            -S "$PROJECT_DIR" \
            -B "$BUILD_DIR" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build GDU WUHB
        shell: bash
        run: |
          set -euo pipefail

          BUILD_DIR="$GITHUB_WORKSPACE/build"
          DIST_DIR="$GITHUB_WORKSPACE/dist"

          cmake --build "$BUILD_DIR" \
            --target gdu_wuhb \
            --parallel 2

          echo "Generated build files:"
          find "$BUILD_DIR" -maxdepth 3 -type f -print

          WUHB_FILE="$(find "$BUILD_DIR" \
            -type f \
            -name 'gdu.wuhb' \
            -print \
            -quit)"

          if [ -z "$WUHB_FILE" ]; then
            WUHB_FILE="$(find "$BUILD_DIR" \
              -type f \
              -name '*.wuhb' \
              -print \
              -quit)"
          fi

          if [ -z "$WUHB_FILE" ] || [ ! -s "$WUHB_FILE" ]; then
            echo "::error::No valid WUHB file was generated."
            exit 1
          fi

          rm -rf "$DIST_DIR"
          mkdir -p "$DIST_DIR"

          cp "$WUHB_FILE" "$DIST_DIR/gdu.wuhb"

          test -s "$DIST_DIR/gdu.wuhb"

          echo "WUHB generated successfully:"
          ls -lh "$DIST_DIR/gdu.wuhb"

      - name: Verify final artifact
        shell: bash
        run: |
          set -euo pipefail

          DIST_DIR="$GITHUB_WORKSPACE/dist"

          test -s "$DIST_DIR/gdu.wuhb"

          if find "$DIST_DIR" \
            -type f \
            -name '*.rpx' |
            grep -q .; then

            echo "::error::An RPX was accidentally included in the final artifact."
            exit 1
          fi

          FILE_COUNT="$(find "$DIST_DIR" \
            -maxdepth 1 \
            -type f |
            wc -l |
            tr -d ' ')"

          if [ "$FILE_COUNT" -ne 1 ]; then
            echo "::error::The final artifact must contain only gdu.wuhb."
            find "$DIST_DIR" -type f -print
            exit 1
          fi

          echo "Final artifact contains only:"
          find "$DIST_DIR" -type f -print

      - name: Upload GDU WUHB
        uses: actions/upload-artifact@v4
        with:
          name: GDU-V4.3-WUHB
          path: dist/gdu.wuhb
          if-no-files-found: error
          retention-days: 30
