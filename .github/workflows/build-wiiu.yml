name: Build GDU Visual Lab Wii U

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Compile GDU 2D 3D for Aroma
    runs-on: ubuntu-latest

    container:
      image: devkitpro/devkitppc:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure devkitPro environment
        shell: bash
        run: |
          set -euo pipefail

          echo "DEVKITPRO=/opt/devkitpro" >> "${GITHUB_ENV}"
          echo "DEVKITPPC=/opt/devkitpro/devkitPPC" >> "${GITHUB_ENV}"

          echo "/opt/devkitpro/devkitPPC/bin" >> "${GITHUB_PATH}"
          echo "/opt/devkitpro/tools/bin" >> "${GITHUB_PATH}"
          echo "/opt/devkitpro/portlibs/wiiu/bin" >> "${GITHUB_PATH}"

      - name: Locate or extract GDU project
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "${GITHUB_WORKSPACE}/CMakeLists.txt" ]; then
            PROJECT_DIR="${GITHUB_WORKSPACE}"
            echo "Project found at repository root."

          elif [ -f "${GITHUB_WORKSPACE}/GDU-visual-lab-2d-3d-custom.zip" ]; then
            EXTRACT_DIR="${GITHUB_WORKSPACE}/extracted-project"

            rm -rf "${EXTRACT_DIR}"
            mkdir -p "${EXTRACT_DIR}"

            unzip -q \
              "${GITHUB_WORKSPACE}/GDU-visual-lab-2d-3d-custom.zip" \
              -d "${EXTRACT_DIR}"

            PROJECT_DIR="${EXTRACT_DIR}"
            echo "Extracted GDU-visual-lab-2d-3d-custom.zip."

          else
            ZIP_FILE="$(find "${GITHUB_WORKSPACE}" \
              -maxdepth 1 \
              -type f \
              -name "GDU*.zip" \
              -print \
              -quit)"

            if [ -z "${ZIP_FILE}" ]; then
              echo "::error::No GDU ZIP archive or extracted project was found."
              exit 1
            fi

            EXTRACT_DIR="${GITHUB_WORKSPACE}/extracted-project"

            rm -rf "${EXTRACT_DIR}"
            mkdir -p "${EXTRACT_DIR}"

            unzip -q "${ZIP_FILE}" -d "${EXTRACT_DIR}"

            PROJECT_DIR="${EXTRACT_DIR}"
            echo "Extracted fallback archive: ${ZIP_FILE}"
          fi

          if [ ! -f "${PROJECT_DIR}/CMakeLists.txt" ]; then
            CMAKE_FILE="$(find "${PROJECT_DIR}" \
              -type f \
              -name "CMakeLists.txt" \
              -print \
              -quit)"

            if [ -z "${CMAKE_FILE}" ]; then
              echo "::error::CMakeLists.txt was not found in the project."
              exit 1
            fi

            PROJECT_DIR="$(dirname "${CMAKE_FILE}")"
          fi

          PROJECT_DIR="$(realpath "${PROJECT_DIR}")"

          echo "PROJECT_DIR=${PROJECT_DIR}" >> "${GITHUB_ENV}"
          echo "Detected project directory: ${PROJECT_DIR}"

          echo "Project contents:"
          find "${PROJECT_DIR}" -maxdepth 2 -type f -print

      - name: Verify required project files
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_FILES=(
            "CMakeLists.txt"
            "source/main.cpp"
            "source/Game.cpp"
            "source/LevelPack.cpp"
            "source/Renderer.cpp"
            "source/VisualEffects.cpp"
            "include/gdu/Game.hpp"
            "include/gdu/LevelPack.hpp"
            "include/gdu/Renderer.hpp"
            "include/gdu/VisualEffects.hpp"
            "assets/levels/pack.json"
            "assets/music/manifest.json"
            "tools/validate_levels.py"
            "tools/validate_audio_durations.py"
          )

          for FILE in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "${PROJECT_DIR}/${FILE}" ]; then
              echo "::error::Missing required file: ${FILE}"
              exit 1
            fi

            echo "Found: ${FILE}"
          done

      - name: Validate all 22 levels
        shell: bash
        run: |
          set -euo pipefail

          cd "${PROJECT_DIR}"
          python3 tools/validate_levels.py

      - name: Validate all 22 music tracks
        shell: bash
        run: |
          set -euo pipefail

          cd "${PROJECT_DIR}"
          python3 tools/validate_audio_durations.py

          MUSIC_COUNT="$(find assets/music \
            -maxdepth 1 \
            -type f \
            -name "*.ogg" |
            wc -l |
            tr -d " ")"

          echo "OGG music files found: ${MUSIC_COUNT}"

          if [ "${MUSIC_COUNT}" -ne 22 ]; then
            echo "::error::Expected 22 OGG music files, found ${MUSIC_COUNT}."
            exit 1
          fi

          test -s "assets/music/22-im-gonna-show-you.ogg"

      - name: Ensure Wii U Pro Controller linkage
        shell: bash
        run: |
          set -euo pipefail

          CMAKE_FILE="${PROJECT_DIR}/CMakeLists.txt"

          if grep -q "KPAD" "${PROJECT_DIR}/source/main.cpp"; then
            if ! grep -qE "target_link_libraries.*padscore" "${CMAKE_FILE}"; then
              echo "" >> "${CMAKE_FILE}"
              echo "# Wii U Pro Controller support" >> "${CMAKE_FILE}"
              echo "target_link_libraries(gdu PRIVATE padscore)" >> "${CMAKE_FILE}"
              echo "Added padscore linkage."
            else
              echo "padscore linkage already present."
            fi
          fi

          echo "Final CMakeLists.txt:"
          cat "${CMAKE_FILE}"

      - name: Check Wii U development tools
        shell: bash
        run: |
          set -euo pipefail

          test -x /opt/devkitpro/devkitPPC/bin/powerpc-eabi-g++
          test -x /opt/devkitpro/tools/bin/elf2rpl
          test -x /opt/devkitpro/tools/bin/wuhbtool
          test -x /opt/devkitpro/portlibs/wiiu/bin/powerpc-eabi-cmake

          /opt/devkitpro/devkitPPC/bin/powerpc-eabi-g++ --version
          cmake --version

          echo "All Wii U development tools were found."

      - name: Configure Wii U build
        shell: bash
        run: |
          set -euo pipefail

          BUILD_DIR="${GITHUB_WORKSPACE}/build"

          rm -rf "${BUILD_DIR}"

          /opt/devkitpro/portlibs/wiiu/bin/powerpc-eabi-cmake \
            -S "${PROJECT_DIR}" \
            -B "${BUILD_DIR}" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Compile native graphical RPX
        shell: bash
        run: |
          set -euo pipefail

          BUILD_DIR="${GITHUB_WORKSPACE}/build"

          cmake --build "${BUILD_DIR}" --parallel 2

          echo "Build directory contents:"
          find "${BUILD_DIR}" -maxdepth 3 -type f -print

          RPX_FILE="${BUILD_DIR}/gdu.rpx"

          if [ ! -s "${RPX_FILE}" ]; then
            RPX_FILE="$(find "${BUILD_DIR}" \
              -type f \
              -name "*.rpx" \
              -print \
              -quit)"
          fi

          if [ -z "${RPX_FILE}" ] || [ ! -s "${RPX_FILE}" ]; then
            echo "::error::No valid RPX file was generated."
            exit 1
          fi

          RPX_FILE="$(realpath "${RPX_FILE}")"

          echo "RPX_FILE=${RPX_FILE}" >> "${GITHUB_ENV}"

          echo "Generated RPX:"
          ls -lh "${RPX_FILE}"

      - name: Create Visual Lab WUHB
        shell: bash
        run: |
          set -euo pipefail

          WUHB_FILE="${GITHUB_WORKSPACE}/build/gdu.wuhb"

          /opt/devkitpro/tools/bin/wuhbtool \
            "${RPX_FILE}" \
            "${WUHB_FILE}" \
            --name="GDU - Pulse Rift" \
            --short-name="GDU" \
            --author="Eitan1414" \
            --content="${PROJECT_DIR}/assets"

          if [ ! -s "${WUHB_FILE}" ]; then
            echo "::error::The WUHB file was not generated."
            exit 1
          fi

          WUHB_FILE="$(realpath "${WUHB_FILE}")"

          echo "WUHB_FILE=${WUHB_FILE}" >> "${GITHUB_ENV}"

          echo "Generated WUHB:"
          ls -lh "${WUHB_FILE}"

      - name: Prepare Aroma SD card package
        shell: bash
        run: |
          set -euo pipefail

          DIST_DIR="${GITHUB_WORKSPACE}/dist"
          APP_DIR="${DIST_DIR}/wiiu/apps/gdu"

          rm -rf "${DIST_DIR}"
          mkdir -p "${APP_DIR}"

          cp "${WUHB_FILE}" "${APP_DIR}/gdu.wuhb"
          cp "${RPX_FILE}" "${APP_DIR}/gdu.rpx"

          if [ -f "${PROJECT_DIR}/README.md" ]; then
            cp "${PROJECT_DIR}/README.md" \
              "${APP_DIR}/README.txt"
          fi

          if [ -f "${PROJECT_DIR}/docs/VISUAL_LAB.md" ]; then
            cp "${PROJECT_DIR}/docs/VISUAL_LAB.md" \
              "${APP_DIR}/VISUAL_LAB.txt"
          fi

          cat > "${APP_DIR}/INSTALL.txt" <<'EOF'
          GDU - Pulse Rift Visual Lab

          Installation Aroma:

          1. Extract this artifact.
          2. Copy the folder named "wiiu" to the root of the Wii U SD card.
          3. Accept folder merging if requested.

          Final executable:
          SD:/wiiu/apps/gdu/gdu.wuhb

          Launch GDU through Aroma or the Homebrew Launcher.

          Do not install this package with WUP Installer GX2.
          EOF

          echo "Final Aroma package contents:"
          find "${DIST_DIR}" -type f -print

      - name: Upload GDU Visual Lab build
        uses: actions/upload-artifact@v4
        with:
          name: GDU-Visual-Lab-2D-3D-WiiU
          path: dist/
          if-no-files-found: error
          retention-days: 30
